app = 'eduflow-greatsong'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 7829
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'eduflow_data'
  destination = '/data/projects'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
