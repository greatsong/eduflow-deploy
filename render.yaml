services:
  - type: web
    name: eduflow
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROJECTS_DIR
        value: /opt/render/project/src/projects
    disk:
      name: eduflow-data
      mountPath: /opt/render/project/src/projects
      sizeGB: 1
